name: SURVEY-TAG-BASED-DEPLOYMENT

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (qa or prod)"
        required: true
        default: "qa"
      tag:
        description: "Image tag to deploy (must already exist in ECR)"
        required: true

jobs:
  deploy:
    name: Deploy Survey Service
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    env:
      NAMESPACE: ${{ github.event.inputs.environment == 'prod' && 'microservices' || 'microservices-qa' }}
      IMAGE_TAG: ${{ github.event.inputs.tag }}
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Write ConfigMap Manifest
        run: |
          echo "${{ secrets.ENV_FILE_CONTENT }}" | base64 -d > manifest/configmap.yaml

      - name: Substitute Image in Deployment Manifest
        run: |
          envsubst < manifest/survey-service.yaml > manifest/survey-service-updated.yaml

      - name: Deploy to EKS
        env:
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION
          kubectl apply -f manifest/configmap.yaml -n $NAMESPACE
          kubectl apply -f manifest/survey-service-updated.yaml -n $NAMESPACE
          kubectl rollout restart deployment/surveymanagement -n $NAMESPACE
          kubectl rollout status deployment/surveymanagement -n $NAMESPACE --timeout=120s
          kubectl get pods -n $NAMESPACE -l app=surveymanagement
